<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        
        .body {
            padding: 0;
            margin: 0;
            background-color: #cbddf6;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 55vh;
            width: 18vw;
            background-color: white;
        
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        .qr-code {

            width: 16vw;
            height: 16vw;
            border-radius: 20px;
            overflow: hidden;
        }
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .text {
            
            text-align: center;
            font-size: 10px;
            font-weight: 400;
        }
        .text p {
            font-size: 15px;
            font-weight: 400;
            color: #666;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="body">  
        <div class="container">
            <div class="qr-code">
                <img src="image-qr-code.png" alt="QR Code">
            </div>
            <div class="text">
                <h1>Improve your front-end<br> skills by building projects</h1>
            </div>
            <div class="text">
                <p>Scan the QR code to visit Frontend <br>Mentor and take your coding skills to<br> the next level</p>
            </div>
        </div>
    </div>
    </div>
    
</body>
</html>
